<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>GH Actions TP</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; }
    input, button { padding: 8px; font-size: 1rem; }
    button { cursor: pointer; margin-left: 8px; }
    #result { margin-top: 20px; font-size: 1.2rem; color: #333; }
    #error  { margin-top: 20px; color: red; }
  </style>
</head>
<body>
  <h1>👋 Greeter App</h1>
  <p>API : <code id="api-url"></code></p>

  <input id="name" type="text" placeholder="Ton prénom" />
  <button onclick="greet()">Saluer</button>

  <div id="result"></div>
  <div id="error"></div>

  <script>
    // Injecté par le workflow via sed (voir ci-dessous)
    const API_URL = 'API_URL_PLACEHOLDER';
    document.getElementById('api-url').textContent = API_URL;

    async function greet() {
      document.getElementById('result').textContent = '';
      document.getElementById('error').textContent = '';

      const name = document.getElementById('name').value.trim();
      if (!name) {
        document.getElementById('error').textContent = 'Saisis un prénom.';
        return;
      }

      try {
        const res = await fetch(`${API_URL}/api/greet/${encodeURIComponent(name)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        document.getElementById('result').textContent = `✅ ${data.message}`;
      } catch (err) {
        document.getElementById('error').textContent = `❌ ${err.message}`;
      }
    }
  </script>
</body>
</html>
